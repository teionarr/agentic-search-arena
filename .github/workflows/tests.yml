name: Tier A tests

# §14 definition of done: Tier A (deterministic, no AI, no keys) must be 100% green
# on every commit. These tests use fakes/fixtures only — no secrets are configured here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  tier-a:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run Tier A suite
        run: python -m pytest tests/arena -q
