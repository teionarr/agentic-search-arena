# search-arena — example config (OPTIONAL).
# With no config, the arena runs across every in-scope provider whose key is present, using
# strong defaults. This file only *overrides*. Secrets never live here — use .env / Doppler.

providers:                      # each optional; absent => enabled if key present
  tavily:            { enabled: true }
  exa:               { enabled: true }
  brave:             { enabled: true }
  serper:            { enabled: true }
  perplexity_search: { enabled: true }
  # per-provider overrides go under `config:`, e.g.:
  # tavily: { enabled: true, config: { max_results: 10 } }

reader:
  model: null                   # null => use the judge model

judge:
  primary: claude
  secondary: null               # M1 — reserved, not wired in M0
  order_swap: true
  exclude_on_flip: true

evidence_budget_tokens: 600     # common per-provider evidence cap (bounds the verbosity confound)

# Benchmark-suite mode (M2, §7): re-run public sets under ONE identical policy, then emit the
# judge-vs-gold calibration report and the marketing-claims ledger. Off by default; a sample per
# set unless you opt into a full run. (--benchmark-suite on the CLI also turns it on.)
modes:
  benchmark_suite:
    enabled: false
    datasets: [simpleqa]          # simpleqa (vendored) · frames · freshqa (drop the data file in)
    sample_size: 300              # per set; raise for a full (costlier) run
    published_claims_path: null   # e.g. configs/published_claims.yaml — vendor-published numbers

# Metric weights (absent/partial metrics are dropped and the rest renormalized).
weights: { accuracy: 0.0, latency: 0.5, coverage: 0.5 }

# Cost pricing map for the cost-per-query column (§8.2). Defaults to configs/pricing.yaml;
# override `path` to point at your own dated prices. The pricing `as_of` date is printed
# alongside the cost column so staleness is visible.
pricing:
  path: null                    # null => configs/pricing.yaml

output:
  dir: results
